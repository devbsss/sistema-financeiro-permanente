<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090C;
  --card:#0D1118;
  --input:#121820;
  --border:rgba(255,255,255,0.06);
  --text:#E4EAF0;
  --muted:#6B8098;
  --green:#00D4AA;
  --red:#FF4D6A;
  --yellow:#FFB400;
  --purple:#A78BFA;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222D3A;border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* HEADER */
#header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,9,12,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
}

#statusSync{
  font-size:12px;color:var(--muted);font-family:'Syne',sans-serif;
  animation:fadeUp 0.3s ease;
}
#statusSync.syncing{color:var(--yellow)}
#statusSync.synced{color:var(--green)}
#statusSync.error{color:var(--red)}

.btn-mes{
  background:transparent;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:4px 8px;transition:color 0.2s;line-height:1;
}
.btn-mes:hover{color:var(--text)}
#labelMes{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text);min-width:120px;text-align:center}
.btn-primary{
  background:var(--green);color:#000;border:none;border-radius:50px;
  padding:8px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;transition:all 0.3s;white-space:nowrap;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,212,170,0.35);background:#00F0C0}
.btn-ghost{
  background:transparent;border:1px solid var(--border);color:var(--text);
  border-radius:50px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;
  cursor:pointer;transition:all 0.3s;
}
.btn-ghost:hover{border-color:var(--green);color:var(--green)}
.btn-icon{
  background:transparent;border:1px solid var(--border);color:var(--text);
  border-radius:50px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:all 0.3s;
}
.btn-icon:hover{border-color:var(--green);color:var(--green)}

/* CARDS */
.grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;
  transition:all 0.3s;
}
.card:hover{border-color:rgba(255,255,255,0.10);transform:translateY(-1px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-family:'Syne',sans-serif}
.card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.card-value{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;line-height:1;margin-bottom:4px}
.card-sub{font-size:11px;color:var(--muted)}

/* GRÁFICOS */
.grid-charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.chart-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:12px;color:var(--text)}
canvas{max-width:100%;height:auto}

/* EXTRATO */
.extrato-container{padding:16px}
.extrato-header{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:50px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all 0.2s;
}
.filter-btn.active{background:var(--green);color:#000;border-color:var(--green)}
.search-box{
  flex:1;min-width:200px;background:var(--input);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;
}
.search-box::placeholder{color:var(--muted)}
.lancamento-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  animation:fadeUp 0.3s ease;
}
.lancamento-info{flex:1}
.lancamento-nome{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}
.lancamento-meta{font-size:11px;color:var(--muted)}
.lancamento-valor{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-right:12px}
.lancamento-valor.receita{color:var(--green)}
.lancamento-valor.despesa{color:var(--red)}
.lancamento-valor.investimento{color:var(--purple)}
.lancamento-actions{display:flex;gap:4px}
.lancamento-actions button{
  background:transparent;border:1px solid var(--border);color:var(--text);
  width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:12px;
  transition:all 0.2s;
}
.lancamento-actions button:hover{border-color:var(--green);color:var(--green)}

/* PARTICIPAÇÃO */
.socio-container{padding:16px}
.socio-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
}
.socio-nome{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:var(--text)}
.socio-valor{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.socio-valor.positivo{color:var(--green)}
.socio-valor.negativo{color:var(--red)}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);z-index:200;animation:fadeUp 0.2s ease;
}
.modal-overlay.active{display:block}
.modal-content{
  position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--border);border-radius:20px 20px 0 0;
  padding:24px;max-height:90vh;overflow-y:auto;z-index:201;
  animation:modalIn 0.3s ease;
}
.modal-header{
  font-family:'Syne',sans-serif;font-weight:700;font-size:18px;
  margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;
}
.modal-close{
  background:transparent;border:none;color:var(--text);font-size:24px;
  cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
}
.form-group{margin-bottom:16px}
.form-label{
  display:block;font-size:12px;color:var(--muted);margin-bottom:6px;
  text-transform:uppercase;font-family:'Syne',sans-serif;
}
.form-input,.form-select{
  width:100%;background:var(--input);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;
  font-family:'DM Sans',sans-serif;transition:border 0.2s;
}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--green)}
.form-input::placeholder{color:var(--muted)}
.form-actions{
  display:flex;gap:8px;margin-top:20px;
}
.form-actions button{flex:1}

/* DRAWER */
.drawer-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);z-index:300;
}
.drawer-overlay.active{display:block}
.drawer-content{
  position:fixed;right:0;top:0;bottom:0;width:min(100%,400px);
  background:var(--card);border-left:1px solid var(--border);
  padding:20px;overflow-y:auto;z-index:301;animation:slideIn 0.3s ease;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-header{
  font-family:'Syne',sans-serif;font-weight:700;font-size:18px;
  margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;
}
.drawer-close{
  background:transparent;border:none;color:var(--text);font-size:24px;
  cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
}
.drawer-section{margin-bottom:24px}
.drawer-section-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  color:var(--muted);text-transform:uppercase;margin-bottom:12px;
}
.drawer-input{
  width:100%;background:var(--input);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;
  margin-bottom:8px;font-family:'DM Sans',sans-serif;
}
.drawer-input:focus{outline:none;border-color:var(--green)}
.drawer-btn{
  width:100%;background:transparent;border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:10px;font-size:13px;
  cursor:pointer;transition:all 0.2s;margin-bottom:8px;font-family:'Syne',sans-serif;
}
.drawer-btn:hover{border-color:var(--green);color:var(--green)}
.drawer-btn.danger{border-color:var(--red);color:var(--red)}
.drawer-btn.danger:hover{background:rgba(255,77,106,0.1)}

/* RESPONSIVE */
@media(max-width:768px){
  .grid-cards,.grid-charts{grid-template-columns:1fr}
  .drawer-content{width:100%}
  #header{flex-direction:column;gap:8px}
}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;padding:12px 16px;
  font-size:13px;color:var(--text);z-index:400;animation:toastIn 0.3s ease;
}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="header">
  <button class="btn-mes" id="btnMesAnterior">←</button>
  <span id="labelMes">Março 2026</span>
  <button class="btn-mes" id="btnMesProximo">→</button>
  <button class="btn-primary" id="btnNovoLancamento">+ Lançamento</button>
  <button class="btn-icon" id="btnConfig">⚙️</button>
  <span id="statusSync">Sincronizando...</span>
</div>

<div class="grid-cards">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-label">Receitas</div>
        <div class="card-value" id="cardReceitas">$0.00</div>
      </div>
      <div class="card-icon" style="background:rgba(0,212,170,0.1);color:var(--green)">📈</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-label">Despesas</div>
        <div class="card-value" id="cardDespesas">$0.00</div>
      </div>
      <div class="card-icon" style="background:rgba(255,77,106,0.1);color:var(--red)">📉</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-label">Investimentos</div>
        <div class="card-value" id="cardInvestimentos">$0.00</div>
      </div>
      <div class="card-icon" style="background:rgba(167,139,250,0.1);color:var(--purple)">💎</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-label">Lucro Líquido</div>
        <div class="card-value" id="cardLucro">$0.00</div>
      </div>
      <div class="card-icon" style="background:rgba(255,180,0,0.1);color:var(--yellow)">💰</div>
    </div>
  </div>
</div>

<div class="grid-charts">
  <div class="chart-container">
    <div class="chart-title">Receitas por Mês (2026)</div>
    <canvas id="chartBarras"></canvas>
  </div>
  <div class="chart-container">
    <div class="chart-title">Distribuição de Despesas</div>
    <canvas id="chartDonut"></canvas>
  </div>
</div>

<div class="extrato-container">
  <div class="extrato-header">
    <button class="filter-btn active" data-filter="todos">Todos</button>
    <button class="filter-btn" data-filter="receitas">Receitas</button>
    <button class="filter-btn" data-filter="despesas">Despesas</button>
    <button class="filter-btn" data-filter="investimentos">Investimentos</button>
    <input type="text" class="search-box" id="searchBox" placeholder="Buscar...">
  </div>
  <div id="extratoLista"></div>
</div>

<div class="socio-container">
  <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text)">Participação dos Sócios</div>
  <div id="sociosList"></div>
</div>

<!-- MODAL NOVO LANÇAMENTO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-header">
      <span>Novo Lançamento</span>
      <button class="modal-close" id="btnCloseModal">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select class="form-select" id="inputTipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
        <option value="investimento">Investimento</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="form-select" id="inputCategoria">
        <option>Venda de Produto/Serviço</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <input type="text" class="form-input" id="inputDescricao" placeholder="Ex: Venda para cliente X">
    </div>
    <div class="form-group">
      <label class="form-label">Valor</label>
      <input type="text" class="form-input" id="inputValor" placeholder="$0.00">
    </div>
    <div class="form-group">
      <label class="form-label">Sócio Responsável</label>
      <select class="form-select" id="inputSocio">
        <option value="0">Ana</option>
        <option value="1">Luiz</option>
        <option value="2">Geruza</option>
        <option value="3">Lucas</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" id="btnCancelar">Cancelar</button>
      <button class="btn-primary" id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>

<!-- DRAWER CONFIGURAÇÕES -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer-content" id="drawerContent">
  <div class="drawer-header">
    <span>Configurações</span>
    <button class="drawer-close" id="btnCloseDrawer">✕</button>
  </div>
  <div class="drawer-section">
    <div class="drawer-section-title">Nomes dos Sócios</div>
    <input type="text" class="drawer-input" id="inputSocio0" placeholder="Sócio 1">
    <input type="text" class="drawer-input" id="inputSocio1" placeholder="Sócio 2">
    <input type="text" class="drawer-input" id="inputSocio2" placeholder="Sócio 3">
    <input type="text" class="drawer-input" id="inputSocio3" placeholder="Sócio 4">
  </div>
  <div class="drawer-section">
    <div class="drawer-section-title">Ações</div>
    <button class="drawer-btn" id="btnExportar">📥 Exportar CSV</button>
    <button class="drawer-btn" id="btnImportar">📤 Importar Dados</button>
    <button class="drawer-btn danger" id="btnLimpar">🗑️ Apagar Tudo</button>
  </div>
</div>

<script>
const GITHUB_TOKEN = localStorage.getItem('ghToken') || prompt('Cole seu token GitHub:');
const GITHUB_OWNER = 'devbsss';
const GITHUB_REPO = 'sistema-financeiro-permanente';
const GITHUB_FILE = 'data.json';

let mesAtual = 3; // Março (0-11)
let anoAtual = 2026;
let lancamentos = [];
let socios = ['Ana', 'Luiz', 'Geruza', 'Lucas'];
let filtroAtivo = 'todos';
let chartBarras, chartDonut;

// ===== SINCRONIZAÇÃO COM GITHUB =====
async function carregarDoGitHub() {
  try {
    atualizarStatus('Sincronizando...', 'syncing');
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const response = await fetch(url, {
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github.v3.raw'
      }
    });
    
    if (response.ok) {
      const data = await response.json();
      lancamentos = data.lancamentos || [];
      socios = data.socios || ['Ana', 'Luiz', 'Geruza', 'Lucas'];
      atualizarStatus('Sincronizado ✓', 'synced');
      setTimeout(() => atualizarStatus('', ''), 2000);
    } else {
      // Se não encontrar o arquivo, usar dados locais
      carregarDoLocal();
      atualizarStatus('', '');
    }
  } catch (error) {
    console.error('Erro ao carregar do GitHub:', error);
    carregarDoLocal();
    atualizarStatus('Modo offline', 'error');
  }
  atualizarUI();
}

async function salvarNoGitHub() {
  try {
    atualizarStatus('Salvando...', 'syncing');
    const data = {
      lancamentos: lancamentos,
      socios: socios,
      ultimaAtualizacao: new Date().toISOString()
    };
    
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    
    // Primeiro, obter o SHA do arquivo atual
    let sha = null;
    try {
      const getResponse = await fetch(url, {
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      if (getResponse.ok) {
        const fileData = await getResponse.json();
        sha = fileData.sha;
      }
    } catch (e) {
      console.log('Arquivo não existe ainda, será criado');
    }
    
    // Agora, fazer o PUT para atualizar ou criar o arquivo
    const putResponse = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Atualização automática - ${new Date().toLocaleString('pt-BR')}`,
        content: btoa(JSON.stringify(data, null, 2)),
        sha: sha
      })
    });
    
    if (putResponse.ok) {
      atualizarStatus('Sincronizado ✓', 'synced');
      setTimeout(() => atualizarStatus('', ''), 2000);
      mostrarToast('Dados salvos com sucesso!', 'success');
    } else {
      throw new Error('Erro ao salvar no GitHub');
    }
  } catch (error) {
    console.error('Erro ao salvar no GitHub:', error);
    atualizarStatus('Erro ao sincronizar', 'error');
    mostrarToast('Erro ao sincronizar. Dados salvos localmente.', 'error');
    salvarNoLocal();
  }
}

function carregarDoLocal() {
  const dados = localStorage.getItem('sistemaMamae');
  if (dados) {
    const parsed = JSON.parse(dados);
    lancamentos = parsed.lancamentos || [];
    socios = parsed.socios || ['Ana', 'Luiz', 'Geruza', 'Lucas'];
  }
}

function salvarNoLocal() {
  localStorage.setItem('sistemaMamae', JSON.stringify({
    lancamentos: lancamentos,
    socios: socios
  }));
}

function atualizarStatus(texto, classe) {
  const el = document.getElementById('statusSync');
  el.textContent = texto;
  el.className = classe;
}

// ===== INTERFACE =====
function atualizarUI() {
  atualizarCards();
  atualizarGraficos();
  atualizarExtrato();
  atualizarSocios();
  atualizarCategorias();
}

function atualizarCards() {
  const lancamentosMes = lancamentos.filter(l => {
    const data = new Date(l.criadoEm);
    return data.getMonth() === mesAtual && data.getFullYear() === anoAtual;
  });
  
  const receitas = lancamentosMes.filter(l => l.tipo === 'receita').reduce((s, l) => s + l.valor, 0);
  const despesas = lancamentosMes.filter(l => l.tipo === 'despesa').reduce((s, l) => s + l.valor, 0);
  const investimentos = lancamentosMes.filter(l => l.tipo === 'investimento').reduce((s, l) => s + l.valor, 0);
  
  document.getElementById('cardReceitas').textContent = formatarMoeda(receitas);
  document.getElementById('cardDespesas').textContent = formatarMoeda(despesas);
  document.getElementById('cardInvestimentos').textContent = formatarMoeda(investimentos);
  document.getElementById('cardLucro').textContent = formatarMoeda(receitas - despesas - investimentos);
}

function atualizarGraficos() {
  // Gráfico de Barras
  const meses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
  const receitas = meses.map((_, i) => {
    const lancamentosMes = lancamentos.filter(l => {
      const data = new Date(l.criadoEm);
      return data.getMonth() === i && data.getFullYear() === anoAtual && l.tipo === 'receita';
    });
    return lancamentosMes.reduce((s, l) => s + l.valor, 0);
  });
  
  const ctxBarras = document.getElementById('chartBarras').getContext('2d');
  if (chartBarras) chartBarras.destroy();
  chartBarras = new Chart(ctxBarras, {
    type: 'bar',
    data: {
      labels: meses,
      datasets: [{
        label: 'Receitas',
        data: receitas,
        backgroundColor: 'rgba(0, 212, 170, 0.8)',
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { color: '#6B8098' }, grid: { color: 'rgba(255,255,255,0.06)' } },
        x: { ticks: { color: '#6B8098' }, grid: { display: false } }
      }
    }
  });
  
  // Gráfico Donut
  const lancamentosMes = lancamentos.filter(l => {
    const data = new Date(l.criadoEm);
    return data.getMonth() === mesAtual && data.getFullYear() === anoAtual && l.tipo === 'despesa';
  });
  
  const categorias = {};
  lancamentosMes.forEach(l => {
    categorias[l.categoria] = (categorias[l.categoria] || 0) + l.valor;
  });
  
  const ctxDonut = document.getElementById('chartDonut').getContext('2d');
  if (chartDonut) chartDonut.destroy();
  chartDonut = new Chart(ctxDonut, {
    type: 'doughnut',
    data: {
      labels: Object.keys(categorias),
      datasets: [{
        data: Object.values(categorias),
        backgroundColor: ['#00D4AA', '#FF4D6A', '#A78BFA', '#FFB400', '#FF6B9D'],
        borderColor: '#0D1118',
        borderWidth: 2
      }]
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#E4EAF0' } } } }
  });
}

function atualizarExtrato() {
  const lancamentosMes = lancamentos.filter(l => {
    const data = new Date(l.criadoEm);
    return data.getMonth() === mesAtual && data.getFullYear() === anoAtual && !l.retirado;
  });
  
  let filtrados = lancamentosMes;
  if (filtroAtivo !== 'todos') {
    filtrados = lancamentosMes.filter(l => l.tipo === filtroAtivo);
  }
  
  const busca = document.getElementById('searchBox').value.toLowerCase();
  if (busca) {
    filtrados = filtrados.filter(l => l.descricao.toLowerCase().includes(busca));
  }
  
  const html = filtrados.map(l => `
    <div class="lancamento-item">
      <div class="lancamento-info">
        <div class="lancamento-nome">${l.descricao}</div>
        <div class="lancamento-meta">${socios[l.socioIdx]} • ${l.categoria}</div>
      </div>
      <div class="lancamento-valor ${l.tipo}">${l.tipo === 'receita' ? '+' : '-'}${formatarMoeda(l.valor)}</div>
      <div class="lancamento-actions">
        <button onclick="retirarLancamento('${l.id}')">✓</button>
        <button onclick="excluirLancamento('${l.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
  
  document.getElementById('extratoLista').innerHTML = html || '<div style="color:var(--muted);text-align:center;padding:20px">Nenhum lançamento</div>';
}

function atualizarSocios() {
  const sociosData = socios.map((nome, idx) => {
    const lancamentosSocio = lancamentos.filter(l => l.socioIdx === idx && !l.retirado);
    const receitas = lancamentosSocio.filter(l => l.tipo === 'receita').reduce((s, l) => s + l.valor, 0);
    const despesas = lancamentosSocio.filter(l => l.tipo === 'despesa').reduce((s, l) => s + l.valor, 0);
    const investimentos = lancamentosSocio.filter(l => l.tipo === 'investimento').reduce((s, l) => s + l.valor, 0);
    const saldo = receitas - despesas - investimentos;
    return { nome, saldo };
  });
  
  const html = sociosData.map(s => `
    <div class="socio-item">
      <div class="socio-nome">${s.nome}</div>
      <div class="socio-valor ${s.saldo >= 0 ? 'positivo' : 'negativo'}">${formatarMoeda(s.saldo)}</div>
    </div>
  `).join('');
  
  document.getElementById('sociosList').innerHTML = html;
}

function atualizarCategorias() {
  const tipo = document.getElementById('inputTipo').value;
  const categorias = {
    receita: ['Venda de Produto/Serviço', 'Consultoria', 'Outro'],
    despesa: ['Fornecedores', 'Salários', 'Aluguel', 'Utilidades', 'Outro'],
    investimento: ['Equipamentos', 'Tecnologia', 'Treinamento', 'Outro']
  };
  
  const select = document.getElementById('inputCategoria');
  select.innerHTML = categorias[tipo].map(c => `<option>${c}</option>`).join('');
}

function formatarMoeda(valor) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(valor);
}

function formatarValor(str) {
  const num = parseFloat(str.replace(/[^\d.]/g, '')) || 0;
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
}

function mostrarToast(msg, tipo) {
  const toast = document.createElement('div');
  toast.className = `toast ${tipo}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== EVENTOS =====
document.getElementById('btnMesAnterior').addEventListener('click', () => {
  mesAtual = (mesAtual - 1 + 12) % 12;
  if (mesAtual === 11) anoAtual--;
  atualizarLabelMes();
  atualizarUI();
});

document.getElementById('btnMesProximo').addEventListener('click', () => {
  mesAtual = (mesAtual + 1) % 12;
  if (mesAtual === 0) anoAtual++;
  atualizarLabelMes();
  atualizarUI();
});

function atualizarLabelMes() {
  const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
  document.getElementById('labelMes').textContent = `${meses[mesAtual]} ${anoAtual}`;
}

document.getElementById('btnNovoLancamento').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.add('active');
});

document.getElementById('btnCloseModal').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});

document.getElementById('inputTipo').addEventListener('change', atualizarCategorias);

document.getElementById('btnSalvar').addEventListener('click', async () => {
  const tipo = document.getElementById('inputTipo').value;
  const categoria = document.getElementById('inputCategoria').value;
  const descricao = document.getElementById('inputDescricao').value;
  const valor = parseFloat(document.getElementById('inputValor').value.replace(/[^\d.]/g, '')) || 0;
  const socioIdx = parseInt(document.getElementById('inputSocio').value);
  
  if (!descricao || valor <= 0) {
    mostrarToast('Preencha todos os campos corretamente', 'error');
    return;
  }
  
  lancamentos.push({
    id: Date.now().toString(),
    tipo, categoria, descricao, valor, socioIdx,
    criadoEm: new Date().toISOString(),
    retirado: false
  });
  
  salvarNoLocal();
  await salvarNoGitHub();
  
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('inputDescricao').value = '';
  document.getElementById('inputValor').value = '';
  atualizarUI();
});

document.getElementById('btnCancelar').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});

document.getElementById('inputValor').addEventListener('input', (e) => {
  e.target.value = formatarValor(e.target.value);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroAtivo = btn.dataset.filter;
    atualizarExtrato();
  });
});

document.getElementById('searchBox').addEventListener('input', atualizarExtrato);

document.getElementById('btnConfig').addEventListener('click', () => {
  document.getElementById('drawerOverlay').classList.add('active');
  document.getElementById('drawerContent').style.display = 'block';
});

document.getElementById('btnCloseDrawer').addEventListener('click', () => {
  document.getElementById('drawerOverlay').classList.remove('active');
  document.getElementById('drawerContent').style.display = 'none';
});

document.getElementById('drawerOverlay').addEventListener('click', () => {
  document.getElementById('drawerOverlay').classList.remove('active');
  document.getElementById('drawerContent').style.display = 'none';
});

['inputSocio0', 'inputSocio1', 'inputSocio2', 'inputSocio3'].forEach((id, idx) => {
  const input = document.getElementById(id);
  input.value = socios[idx];
  input.addEventListener('change', async () => {
    socios[idx] = input.value;
    salvarNoLocal();
    await salvarNoGitHub();
    atualizarUI();
  });
});

document.getElementById('btnExportar').addEventListener('click', () => {
  const csv = 'Descrição,Tipo,Categoria,Valor,Sócio,Data\n' +
    lancamentos.map(l => `"${l.descricao}","${l.tipo}","${l.categoria}",${l.valor},"${socios[l.socioIdx]}","${new Date(l.criadoEm).toLocaleDateString('pt-BR')}"`).join('\n');
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'lancamentos.csv';
  link.click();
  mostrarToast('Arquivo exportado!', 'success');
});

document.getElementById('btnImportar').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = async (event) => {
      try {
        const data = JSON.parse(event.target.result);
        lancamentos = data.lancamentos || [];
        socios = data.socios || socios;
        salvarNoLocal();
        await salvarNoGitHub();
        atualizarUI();
        mostrarToast('Dados importados!', 'success');
      } catch (err) {
        mostrarToast('Erro ao importar', 'error');
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  if (confirm('Tem certeza? Isso vai apagar TODOS os dados!')) {
    lancamentos = [];
    salvarNoLocal();
    salvarNoGitHub();
    atualizarUI();
    mostrarToast('Todos os dados foram apagados', 'success');
  }
});

function retirarLancamento(id) {
  const l = lancamentos.find(x => x.id === id);
  if (l) {
    l.retirado = !l.retirado;
    salvarNoLocal();
    salvarNoGitHub();
    atualizarUI();
  }
}

function excluirLancamento(id) {
  if (confirm('Excluir este lançamento?')) {
    lancamentos = lancamentos.filter(l => l.id !== id);
    salvarNoLocal();
    salvarNoGitHub();
    atualizarUI();
  }
}

// ===== INICIALIZAÇÃO =====
document.addEventListener('DOMContentLoaded', async () => {
  atualizarLabelMes();
  await carregarDoGitHub();
  
  // Sincronizar a cada 30 segundos
  setInterval(carregarDoGitHub, 30000);
});
</script>
